name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v2.5.1)"
        required: true
        default: "v2.5.1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          {
            echo "## Highlights"
            echo ""
            echo "MCP server for heterogeneous AI validation — T1 structured reasoning, T2 cross-model evaluation, deterministic checksum. Python stdlib-only."
            echo ""
            if grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
              sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d' | tail -n +2
            else
              sed -n "/^## v${VERSION}/,/^## v/p" CHANGELOG.md | sed '$d' | tail -n +2
            fi
          } > release-notes.md
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "${TAG}" = "v2.5.1" ]; then
            echo "title=v2.5.1 — Initial Public Release" >> "$GITHUB_OUTPUT"
          else
            echo "title=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.title }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
