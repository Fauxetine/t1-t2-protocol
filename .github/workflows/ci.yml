name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package and dev dependencies
      run: pip install -e ".[dev]"
    - name: Run pytest
      env:
        T1T2_DISABLE_COUNTERS: "1"
      run: python -m pytest tests/ -v
    - name: Verify console script is registered
      run: |
        VERSION=$(python -c "import re; print(re.search(r'^version = \"([^\"]+)\"', open('pyproject.toml').read(), re.M).group(1))")
        python -c "import importlib.metadata as m; assert m.version('t1-t2-protocol') == '${VERSION}'"
