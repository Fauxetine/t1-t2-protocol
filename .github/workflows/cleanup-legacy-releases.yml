name: Cleanup Legacy Releases

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Mint PyPI API token (Trusted Publishing)
        id: mint-token
        run: |
          set -euo pipefail
          resp=$(curl -sf -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pypi")
          oidc_token=$(jq -r '.value' <<< "${resp}")
          resp=$(curl -sf -X POST https://pypi.org/_/oidc/mint-token \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"${oidc_token}\"}")
          api_token=$(jq -r '.token' <<< "${resp}")
          if [ -z "${api_token}" ] || [ "${api_token}" = "null" ]; then
            echo "::error::Failed to mint PyPI token via Trusted Publishing"
            exit 1
          fi
          echo "::add-mask::${api_token}"
          echo "api-token=${api_token}" >> "${GITHUB_OUTPUT}"

      - name: Yank erroneous PyPI releases (2.5.2–2.5.4)
        env:
          PYPI_TOKEN: ${{ steps.mint-token.outputs.api-token }}
          FALLBACK_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="${PYPI_TOKEN:-}"
          if [ -z "${TOKEN}" ] && [ -n "${FALLBACK_TOKEN:-}" ]; then
            TOKEN="${FALLBACK_TOKEN}"
          fi
          if [ -z "${TOKEN}" ]; then
            echo "::error::No PyPI token available"
            exit 1
          fi
          REASON='Erroneous semver for day-one release; superseded by 0.1.0 (protocol v2.5).'
          for ver in 2.5.2 2.5.3 2.5.4; do
            echo "Yanking PyPI ${ver}..."
            http_code=$(curl -s -o /tmp/yank-body.txt -w "%{http_code}" \
              -X PATCH "https://pypi.org/api/projects/t1-t2-protocol/${ver}" \
              -H "Content-Type: application/json" \
              -u "__token__:${TOKEN}" \
              -d "{\"yanked\": true, \"yanked_reason\": \"${REASON}\"}")
            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Yanked ${ver} (HTTP ${http_code})"
            else
              echo "::warning::PyPI yank ${ver} returned HTTP ${http_code}: $(cat /tmp/yank-body.txt)"
            fi
          done

      - name: Install MCP Publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Login to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Delete erroneous MCP Registry versions
        run: |
          SERVER="io.github.Fauxetine/t1-t2-protocol"
          MSG="Erroneous semver; superseded by package 0.1.0 (protocol v2.5)."
          for ver in 2.5.3 2.5.4; do
            echo "Deleting registry ${SERVER} ${ver}..."
            ./mcp-publisher status --status deleted --message "${MSG}" --yes "${SERVER}" "${ver}" \
              || echo "::warning::Registry delete ${ver} failed (may already be deleted)"
          done
