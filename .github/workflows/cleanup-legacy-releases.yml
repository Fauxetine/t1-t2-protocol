name: Cleanup Legacy Releases

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Yank erroneous PyPI releases (2.5.2–2.5.4)
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PYPI_TOKEN:-}" ]; then
            echo "::error::PYPI_API_TOKEN secret required for yank (Trusted Publishing tokens are upload-only; yank needs owner API token)."
            echo "Create at https://pypi.org/manage/account/token/ scoped to t1-t2-protocol, add as repo secret PYPI_API_TOKEN."
            exit 1
          fi
          REASON='Erroneous semver for day-one release; superseded by 0.1.0 (protocol v2.5).'
          for ver in 2.5.2 2.5.3 2.5.4; do
            echo "Yanking PyPI ${ver}..."
            http_code=$(curl -s -o /tmp/yank-body.txt -w "%{http_code}" \
              -X PATCH "https://pypi.org/api/projects/t1-t2-protocol/${ver}" \
              -H "Content-Type: application/json" \
              -u "__token__:${PYPI_TOKEN}" \
              -d "{\"yanked\": true, \"yanked_reason\": \"${REASON}\"}")
            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Yanked ${ver} (HTTP ${http_code})"
            else
              echo "::error::PyPI yank ${ver} failed HTTP ${http_code}: $(cat /tmp/yank-body.txt)"
              exit 1
            fi
          done

      - name: Install MCP Publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Login to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Delete erroneous MCP Registry versions
        run: |
          SERVER="io.github.Fauxetine/t1-t2-protocol"
          MSG="Erroneous semver; superseded by package 0.1.0 (protocol v2.5)."
          for ver in 2.5.3 2.5.4; do
            echo "Deleting registry ${SERVER} ${ver}..."
            ./mcp-publisher status --status deleted --message "${MSG}" --yes "${SERVER}" "${ver}" \
              || echo "::warning::Registry delete ${ver} failed (may already be deleted)"
          done
