name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      yank_legacy_only:
        description: "Yank erroneous PyPI 2.5.2–2.5.4 only (no publish)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  yank-legacy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.yank_legacy_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Yank erroneous PyPI releases (2.5.2–2.5.4)
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PYPI_TOKEN:-}" ]; then
            echo "::error::PYPI_API_TOKEN secret required (Trusted Publishing is upload-only; yank needs owner API token)."
            exit 1
          fi
          REASON='Erroneous semver for day-one release; superseded by 0.1.0 (protocol v2.5).'
          for ver in 2.5.2 2.5.3 2.5.4; do
            echo "Yanking PyPI ${ver}..."
            curl -sf -X PATCH "https://pypi.org/api/projects/t1-t2-protocol/${ver}" \
              -H "Content-Type: application/json" \
              -u "__token__:${PYPI_TOKEN}" \
              -d "{\"yanked\": true, \"yanked_reason\": \"${REASON}\"}"
            echo "Yanked ${ver}"
          done

  publish:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.yank_legacy_only != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        env:
          T1T2_DISABLE_COUNTERS: "1"
        run: |
          pip install -e ".[dev]" build
          python -m pytest tests/ -v

      - name: Sync server.json version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > tmp.json && mv tmp.json server.json

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Install MCP Publisher
        if: success()
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Login to MCP Registry
        if: success()
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: success()
        run: ./mcp-publisher publish
